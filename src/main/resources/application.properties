# =============================================================
# Quiz Website — Spring Boot configuration
# Override DB credentials via environment variables or a
# (git-ignored) application-local.properties — see below.
# =============================================================

spring.application.name=quiz-website

# ---- HTTP / session ----
server.servlet.context-path=/
server.servlet.session.timeout=60m

# ---- Datasource (MySQL) ----
# createDatabaseIfNotExist lets Hibernate build the schema on first run.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quiz_website?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ---- JPA / Hibernate ----
# The local server is MariaDB; set the dialect explicitly so Hibernate doesn't
# auto-probe (its probe query is incompatible with some MariaDB versions).
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# 'update' keeps the schema in sync with the @Entity classes; no manual schema.sql needed.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.show-sql=true

# ---- Thymeleaf ----
spring.thymeleaf.cache=false

# ---- Local overrides (git-ignored): put your real DB creds here ----
spring.config.import=optional:classpath:application-local.properties
